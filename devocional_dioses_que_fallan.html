<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devocional 30 Días – Dioses que Fallan</title>
<style>
  :root {
    --cream: #fdf6ee;
    --gold: #b5872a;
    --gold-light: #e8c97a;
    --brown: #5c3d1e;
    --text: #2c1a0e;
    --gray: #8a7a6a;
    --done-bg: #e8f4e8;
    --done-border: #5a9a5a;
    --card-shadow: 0 4px 18px rgba(92,61,30,0.13);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, var(--brown) 0%, #8b5a2b 100%);
    color: #fff;
    text-align: center;
    padding: 40px 20px 32px;
    border-bottom: 4px solid var(--gold);
  }

  header h1 {
    font-size: 2.1rem;
    letter-spacing: .04em;
    margin-bottom: 8px;
    text-shadow: 0 2px 6px rgba(0,0,0,.3);
  }

  header p {
    font-size: 1rem;
    opacity: .85;
    font-style: italic;
  }

  .progress-bar-wrap {
    background: rgba(255,255,255,.2);
    border-radius: 20px;
    height: 10px;
    width: 60%;
    margin: 18px auto 0;
    overflow: hidden;
  }

  #progress-bar {
    height: 100%;
    background: var(--gold-light);
    border-radius: 20px;
    transition: width .5s ease;
    width: 0%;
  }

  #progress-label {
    color: var(--gold-light);
    font-size: .85rem;
    margin-top: 6px;
    text-align: center;
  }

  .nav-tabs {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 6px;
    padding: 20px 16px 8px;
    background: #f5ede0;
    border-bottom: 1px solid #e0cdb5;
  }

  .tab-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    background: #fff;
    color: var(--brown);
    font-size: .9rem;
    font-weight: bold;
    cursor: pointer;
    transition: all .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .tab-btn:hover {
    background: var(--gold-light);
    transform: scale(1.08);
  }

  .tab-btn.active {
    background: var(--brown);
    color: #fff;
    border-color: var(--brown);
    box-shadow: 0 2px 8px rgba(92,61,30,.4);
  }

  .tab-btn.done {
    background: var(--done-bg);
    border-color: var(--done-border);
    color: var(--done-border);
  }

  .tab-btn.done::after {
    content: '✓';
    position: absolute;
    top: -6px;
    right: -6px;
    background: var(--done-border);
    color: #fff;
    border-radius: 50%;
    width: 16px;
    height: 16px;
    font-size: .6rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
  }

  .main-content {
    max-width: 760px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  .day-card {
    background: #fff;
    border-radius: 12px;
    box-shadow: var(--card-shadow);
    overflow: hidden;
    display: none;
  }

  .day-card.active { display: block; }

  .day-header {
    background: linear-gradient(135deg, var(--brown) 0%, #7a4f20 100%);
    padding: 24px 28px;
    color: #fff;
  }

  .day-label {
    font-size: .8rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    opacity: .75;
    margin-bottom: 4px;
  }

  .day-title {
    font-size: 1.5rem;
    font-weight: bold;
    margin-bottom: 4px;
  }

  .day-subtitle {
    font-size: .95rem;
    opacity: .85;
    font-style: italic;
  }

  .day-body {
    padding: 28px 28px 20px;
  }

  .verse-box {
    background: linear-gradient(135deg, #fdf0d5 0%, #fef8ec 100%);
    border-left: 5px solid var(--gold);
    border-radius: 0 8px 8px 0;
    padding: 16px 20px;
    margin-bottom: 24px;
    font-style: italic;
    font-size: 1rem;
    color: var(--brown);
    line-height: 1.7;
  }

  .verse-ref {
    display: block;
    margin-top: 8px;
    font-weight: bold;
    font-style: normal;
    font-size: .88rem;
    color: var(--gold);
  }

  .day-content p {
    font-size: 1.02rem;
    line-height: 1.82;
    color: var(--text);
    margin-bottom: 18px;
    text-align: justify;
  }

  .reflection-box {
    background: #f7f0e8;
    border-radius: 10px;
    padding: 20px 22px;
    margin-top: 24px;
    border-top: 3px solid var(--gold-light);
  }

  .reflection-box h3 {
    font-size: .9rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 10px;
  }

  .reflection-box p {
    font-size: .97rem;
    line-height: 1.7;
    color: var(--brown);
    font-style: italic;
  }

  .prayer-box {
    background: #eef4ee;
    border-radius: 10px;
    padding: 18px 22px;
    margin-top: 16px;
    border-left: 4px solid var(--done-border);
  }

  .prayer-box h3 {
    font-size: .9rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: #4a7a4a;
    margin-bottom: 10px;
  }

  .prayer-box p {
    font-size: .97rem;
    line-height: 1.7;
    color: #2e5c2e;
    font-style: italic;
  }

  .done-btn-wrap {
    padding: 24px 28px;
    border-top: 1px solid #f0e8d8;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn-done {
    background: var(--brown);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px 26px;
    font-size: 1rem;
    font-family: inherit;
    cursor: pointer;
    font-weight: bold;
    transition: all .2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-done:hover { background: #3e2610; transform: translateY(-1px); }

  .btn-done.completed {
    background: var(--done-border);
  }

  .btn-next {
    background: transparent;
    border: 2px solid var(--gold);
    color: var(--brown);
    border-radius: 8px;
    padding: 11px 22px;
    font-size: .95rem;
    font-family: inherit;
    cursor: pointer;
    font-weight: bold;
    transition: all .2s;
  }

  .btn-next:hover { background: var(--gold-light); }

  .completed-badge {
    display: none;
    align-items: center;
    gap: 6px;
    color: var(--done-border);
    font-weight: bold;
    font-size: .95rem;
  }

  .completed-badge.show { display: flex; }

  @media (max-width: 600px) {
    header h1 { font-size: 1.45rem; }
    .day-title { font-size: 1.2rem; }
    .day-body { padding: 20px 18px 14px; }
    .done-btn-wrap { padding: 18px; }
    .progress-bar-wrap { width: 85%; }
  }
</style>
</head>
<body>

<header>
  <h1>📖 Dioses que Fallan</h1>
  <p>Devocional de 30 Días — Timothy Keller</p>
  <div class="progress-bar-wrap"><div id="progress-bar"></div></div>
  <div id="progress-label">0 de 30 días completados</div>
</header>

<div class="nav-tabs" id="nav-tabs"></div>

<div class="main-content">
  <div id="cards-container"></div>
</div>

    content: [

      "Ya en la década de 1830, Alexis de Tocqueville observó en América \"una extraña melancolía que invade a sus habitantes... aun en medio de la abundancia\". Los estadounidenses creían que la prosperidad saciaría su sed de felicidad, pero dicha esperanza era ilusoria, porque los gozos incompletos de este mundo nunca satisfacen el corazón humano. Esta extraña melancolía se manifiesta de muchas formas, pero siempre conduce a la misma desesperación nacida de no encontrar lo que se busca.",
      "Existe una diferencia entre la tristeza y la desesperación. La tristeza es un dolor para el que existen maneras de aliviarlo. Sin embargo, la desesperación es inconsolable, porque nace de perder algo esencial. Cuando usted pierde la fuente esencial del sentido de su vida o de su esperanza, ya no hay otras fuentes a las que recurrir. Esto quebranta nuestro espíritu. De Tocqueville dice que esta melancolía es el resultado de escoger \"un goce incompleto de este mundo\" y convertirlo en el eje de la existencia. Esta es, precisamente, la definición de la idolatría.",
      "La Biblia afirma que el corazón humano es una \"fábrica de ídolos\". Lo que Dios decía al señalar los ídolos en el corazón de los líderes de Israel es que el corazón humano toma cosas buenas —una carrera de éxito, el amor, los bienes materiales, incluso la familia— y las convierte en esenciales. Nuestros corazones las deifican como el centro de nuestras vidas, porque pensamos que, si las alcanzamos, pueden ofrecernos trascendencia y seguridad, tranquilidad y plenitud. El problema no está en las cosas mismas, sino en el lugar que les damos en nuestro corazón."

  {

    content: [
      "Cuando la mayoría de personas piensa en los ídolos, tiene en mente estatuas físicas o quizás la estrella del pop del momento. Sin embargo, la adoración tradicional a los ídolos sigue teniendo lugar en muchos lugares del mundo, y la pleitesía interior, la que se rinde dentro del corazón, es universal. Dios dice que los líderes de Israel pusieron sus ídolos en su corazón. Y la respuesta más natural habría sido: \"¿Ídolos? ¿Qué ídolos? ¡Yo no veo ningún ídolo!\".",
      "Nuestra sociedad contemporánea, en su esencia, no es distinta de las antiguas. Cada cultura está dominada por su propio conjunto de ídolos. Cada una tiene sus \"sacerdocios\", sus tótems y sus rituales. Cada una tiene sus santuarios —complejos de oficinas, spas y gimnasios, estudios o estadios— donde hay que presentar sacrificios para obtener las bendiciones de la buena vida. ¿Qué son los dioses de la belleza, el poder, el dinero y el éxito sino aquellas mismas cosas que han asumido unas proporciones míticas en nuestras vidas individuales y en nuestras sociedades?",
      "Es posible que no nos arrodillemos físicamente ante la estatua de Afrodita, pero hoy día son muchas las jóvenes que caen en depresiones y en trastornos alimentarios porque sienten una preocupación desmedida por su imagen física. Seguramente no encendemos incienso para Artemisa, pero cuando el dinero y la carrera profesional alcanzan dimensiones cósmicas, realizamos una especie de sacrificio de niños, olvidando a la familia y a la comunidad para alcanzar un estrato empresarial superior y obtener más dinero y prestigio.",

      "Puede ser la familia y los hijos, la carrera profesional y ganar dinero, los éxitos y el aplauso de los demás, o guardar las apariencias y conservar la posición social. Puede tratarse de una relación sentimental, la aprobación de nuestros iguales, la competencia y la capacidad, unas circunstancias seguras y cómodas, su belleza o su intelecto, una gran causa política o social, su moral y su virtud o incluso el éxito en el ministerio cristiano. Un ídolo es cualquier cosa en la que usted fija su vista y dice en lo más íntimo de su corazón: \"Si consigo eso, mi vida tendrá sentido\".",
      "Los paganos de la antigüedad no fueron muy fantasiosos cuando concibieron que prácticamente cualquier cosa era un dios. Tenían divinidades del sexo, del trabajo, de la guerra, del dinero, dioses nacionales; y esto por la simple razón de que cualquier cosa puede convertirse en un dios que gobierne el corazón de un individuo o en la vida de todo un pueblo. Si cualquier cosa se vuelve más fundamental que Dios para su felicidad, el sentido de su vida y su identidad, entonces es un ídolo. La belleza física puede ser agradable, pero si se la \"deifica\", el resultado no es simplemente la belleza, sino una forma de adoración que distorsiona todo lo demás.",
      "La Biblia usa tres metáforas básicas para describir cómo se relacionan las personas con los ídolos de sus corazones: los aman, confían en ellos y los obedecen. En ocasiones se habla de los ídolos usando una metáfora matrimonial: Dios debería ser nuestro verdadero esposo, pero cuando deseamos otras cosas y nos deleitamos en ellas más que en Dios, cometemos un adulterio espiritual. Lo que muchas personas tildan de \"problemas psicológicos\" no son más que sencillas cuestiones de idolatría. El perfeccionismo, la adicción al trabajo, la indecisión crónica, la necesidad de controlar las vidas de otros... son cosas que se dan cuando convertimos algo bueno en ídolos que entonces nos hacen caer de rodillas para complacerlos."

  {

      "Jacob ofreció el sueldo de siete años por ella, que en aquella época era un precio exorbitado por una esposa. Y le parecieron como pocos días porque la amaba. Cuando llegó el momento de reclamarla, el texto dice con una franqueza inusual que Jacob estaba consumido por el deseo emocional y sexual por ella. ¿Por qué semejante intensidad? Porque la vida de Jacob estaba vacía. Nunca disfrutó del amor de su padre, había perdido a su querida madre y, sin duda, ignoraba el amor y el cuidado de Dios. Al contemplar a Raquel, probablemente dijo para sí: \"Si la tuviera, por fin algo saldría bien en mi vida miserable. Si la tuviera, todo se arreglaría\".",
      "Los deseos de su corazón de encontrar sentido y afirmación se concentraron en Raquel. Pero la vida de Lea también encalló en los arrecifes de la tristeza. Ella era la hermana mayor, menos agraciada, que nadie quería. Intentó encontrar la felicidad y la identidad por medio de los valores familiares tradicionales: tener hijos. Con cada hijo pensaba: \"Mi marido me amará\". Pero, en lugar de eso, cada nacimiento la empujaba a mayor profundidad en el infierno de la soledad. Cada día de su vida estaba condenada a ver cómo el hombre al que más amaba se refugiaba en los brazos de su hermana.",

      "C. S. Lewis describe este fenómeno en Mero Cristianismo: \"La mayoría de personas, si realmente han aprendido a mirar en sus corazones, sabrán que quieren, y quieren ardientemente, algo que no pueden tener en este mundo. Los anhelos que nacen en nosotros cuando nos enamoramos por primera vez, o cuando pensamos por primera vez en un país extranjero, son anhelos que ni el matrimonio, ni el viaje, ni el aprendizaje pueden realmente satisfacer. Hubo algo que aprehendimos en ese primer momento de anhelo que en la realidad se desvanece\".",

    content: [
      "Zaqueo era el architelones, el archirrecaudador. Era uno de los ciudadanos más ricos y más odiados de la sociedad israelita. Había sacrificado todo lo demás por tener dinero: su reputación, su lugar en la comunidad, su dignidad. Sin embargo, algo lo impulsó a querer ver a Jesús. Y su disposición a subirse a un árbol —un acto ridículo para un hombre de su posición— apuntaba a algo rayano en la desesperación. La riqueza que había acumulado no había llenado el vacío en su interior.",
      "Jesús se acercó y vio una multitud formada sobre todo por personajes religiosos respetables. En lugar de dirigirse a alguno de ellos, interpeló al \"pecador\" más destacado de todos. Sin dudarlo, le dijo: \"Zaqueo, date prisa, desciende, porque hoy es necesario que pose yo en tu casa\". Zaqueo no abordó a Jesús con orgullo, sino con humildad. No tiró de dignidad y de riqueza; dejó a un lado su posición social en la vida y estuvo dispuesto a quedar en ridículo para poder ver a Jesús. Entonces, Jesús fue a su casa.",
      "Cuando Zaqueo vio que Jesús había elegido a la persona menos virtuosa de la multitud para mantener una relación personal, todo su paradigma espiritual empezó a alterarse. Empezó a darse cuenta de que la salvación de Dios era por gracia, no se alcanzaba por medio de las victorias morales o las obras. Esa revelación le traspasó como un rayo, y dio la bienvenida a Jesús con alegría. Entonces prometió dar la mitad de sus bienes a los pobres y restituir cuatro veces lo que había defraudado.",
      "Zaqueo quería seguir a Jesús y de inmediato se dio cuenta de que, si pretendía hacerlo, el dinero era un problema. Pero estas promesas no fueron la condición para la salvación, sino su consecuencia. Jesús dijo: \"Hoy ha venido la salvación a esta casa\". No dijo: \"Si vives así, la salvación vendrá\". La salvación de Dios no viene como respuesta a una vida transformada. La vida transformada es la respuesta a la salvación, ofrecida como un regalo. Se dio cuenta de que, aunque era rico materialmente, desde el punto de vista espiritual había estado en bancarrota. La gracia de Dios había transformado su actitud hacia su riqueza."
    ],
    reflection: "¿Qué tendría que cambiar en tu relación con el dinero si realmente creyeras que ya tienes todo lo necesario en Cristo?",
    prayer: "Señor, que Tu gracia transforme mi relación con el dinero. Que pueda ser generoso porque sé que Tú provees. Que el dinero sea siervo y nunca señor en mi vida. Amén."
  },
  {
    title: "Ídolos Profundos",
    subtitle: "Las motivaciones ocultas detrás de lo que adoramos",
    verse: "\"El pecado en nuestros corazones afecta a nuestras motivaciones básicas, de modo que se vuelven idolátricas.\" — Timothy Keller",
    content: [
      "Para entender cómo empezó a cambiar el corazón de Zaqueo, debemos pensar que los dioses falsos se presentan en grupos, haciendo que la estructura de la idolatría en el corazón sea compleja. Hay \"ídolos profundos\" dentro del corazón, bajo los \"ídolos de superficie\" más concretos y visibles a los que servimos. El pecado en nuestros corazones afecta a nuestras motivaciones básicas, de modo que se vuelven idolátricas.",
      "Algunas personas se sienten profundamente motivadas por el deseo de influir y de tener poder, mientras a otras las emociona más la aprobación y el aprecio de los demás. Hay quienes anhelan por encima de todo el bienestar emocional y físico, mientras otros buscan la seguridad, el control de su entorno. A las personas con el ídolo profundo del poder no les importa ser impopulares si con ello obtienen influencia. Las personas más motivadas por la aprobación hacen lo contrario: renunciarán alegremente al poder para que todo el mundo piense bien de ellos.",
      "Los \"ídolos de superficie\" son cosas como el dinero, nuestro cónyuge o nuestros hijos, por medio de los cuales nuestros ídolos profundos buscan satisfacción. Por ejemplo, el dinero puede ser un ídolo de superficie que sirva para satisfacer impulsos más fundamentales. Algunas personas quieren tener mucho dinero como vía para controlar su mundo y su vida, y generalmente no gastan mucho y viven modestamente. Otros quieren dinero para tener acceso a círculos sociales y para estar atractivos. Hay quienes lo quieren porque les da poder sobre otros. En cualquier caso, el dinero funciona como un ídolo y, debido a los diversos ídolos profundos, da como resultado patrones conductuales muy distintos.",
      "Por este motivo, los ídolos no se pueden erradicar eliminando sencillamente los de superficie. Podemos mirarlos y decir: \"Tengo que quitarle importancia a esto en mi vida. No debo permitir que me controle. Lo detendré\". Los ataques directos como ese no funcionarán, porque a los ídolos profundos se los debe atacar en el nivel del corazón. Sólo hay una manera de cambiar en ese nivel, y es por medio de la fe en el evangelio. La gracia de Cristo es el único poder suficientemente profundo para llegar a la raíz de la idolatría."
    ],
    reflection: "¿Cuál es tu ídolo profundo? ¿Es el poder, la aprobación, la comodidad o el control? ¿Cómo se manifiesta ese ídolo en diferentes áreas de tu vida?",
    prayer: "Señor, examina los niveles más profundos de mi corazón. Llega donde yo no puedo llegar solo. Transforma mis motivaciones más íntimas para que busque glorificarte a Ti por encima de todo. Amén."
  },
  {
    title: "La Pobreza de Cristo",
    subtitle: "El evangelio como antídoto definitivo contra la codicia",
    verse: "\"Por amor a vosotros se hizo pobre, siendo rico, para que vosotros con su pobreza fueseis enriquecidos.\" — 2 Corintios 8:9",
    content: [
      "En 2 Corintios 8 y 9, Pablo pide a una iglesia que haga una ofrenda para los pobres. Aunque es un apóstol con autoridad, escribe: \"No hablo como quien manda\". Lo que quiere decir es: \"No pretendo ordenaros nada. No quiero que esta ofrenda sea simplemente la respuesta a una petición\". No presiona directamente la voluntad. En lugar de eso, resume el evangelio con una de las frases más hermosas de toda la Biblia: \"Porque ya conocéis la gracia de nuestro Señor Jesucristo, que por amor a vosotros se hizo pobre, siendo rico, para que vosotros con su pobreza fueseis enriquecidos\".",
      "Jesús, el Dios-hombre, tenía unas riquezas infinitas, pero, si se hubiera apegado a ellas, nosotros habríamos muerto en nuestra pobreza espiritual. Esta era la alternativa: si él seguía siendo rico, nosotros moriríamos pobres. Si él moría pobre, nosotros nos enriqueceríamos; nuestros pecados serían perdonados y seríamos admitidos en la familia de Dios. Pablo no se limitaba a dar a esta iglesia un mero precepto ético. Más bien, resumió el evangelio y confió en que esa comprensión transformaría los corazones y las billeteras.",
      "Jesús renunció a su tesoro celestial para hacer de nosotros su tesoro. Cuando usted contemple eso, él pasará a ser suyo. El dinero dejará de ser el fundamento de su existencia y de su seguridad, y querrá bendecir a otros con lo que usted tenga. Cuanto más comprenda el evangelio, menos poder tendrá el dinero sobre usted. Piense en la gracia incalculable de Dios hasta que esto le convierta en alguien generoso.",
      "La solución para la tacañería es una reorientación hacia la generosidad de Cristo en el evangelio, cómo él derramó su riqueza por mí. Ahora, no tienes que preocuparte por el dinero: la cruz demuestra que Dios cuida de ti y te dará seguridad. Ya no tienes que envidiar el dinero de nadie. El amor y la salvación de Dios te confieren un estatus notable, algo que el dinero no puede darte. Lo que destruye el poder del dinero sobre nosotros no es simplemente que nos esforcemos más por seguir el ejemplo de Cristo, sino que profundicemos nuestra comprensión de la salvación de Cristo."
    ],
    reflection: "¿Cómo cambia tu perspectiva sobre el dinero saber que Jesús se hizo pobre para que tú te enriquecieras espiritualmente?",
    prayer: "Jesús, gracias porque dejaste Tu riqueza para hacerme a mí Tu tesoro. Que esa verdad me haga libre para ser generoso, sabiendo que en Ti tengo todo lo que realmente necesito. Amén."
  },
  {
    title: "El Éxito como Ídolo",
    subtitle: "La trampa del logro y el aplauso",
    verse: "\"Lo que me impulsa en la vida es este miedo espantoso a la mediocridad.\" — Madonna",
    content: [
      "Madonna, la leyenda del pop, describió con sus propias palabras la seducción del éxito: \"Tengo una voluntad de hierro, que he concentrado siempre en superar una terrible sensación de indignidad... Supero uno de esos episodios y descubro que soy un ser humano especial, y luego llega otro bache y pienso que soy mediocre y carente de interés... Lo que me impulsa en la vida es este miedo espantoso a la mediocridad. Y no deja de empujarme y empujarme. Porque, aunque me he convertido en Alguien, aún tengo que demostrar que lo soy. Mi lucha nunca ha acabado\".",
      "Para personas como ella, el éxito es como una droga que proporciona un sentido de importancia y de valor, pero el efecto se disipa rápidamente y se necesita tomar otra dosis. Debe hacerse una demostración tras otra. La fuerza impulsora no es la alegría, sino el miedo. Andrew Carnegie, uno de los hombres más ricos del mundo, escribió a sus 33 años: \"El ser humano debe tener un ídolo. La acumulación de riqueza es uno de los peores tipos de idolatría. No hay un ídolo más degradante que la adoración al dinero\". Resultan notables el candor y el conocimiento de sí mismo reflejados en esa anotación. Pero a pesar de eso, Carnegie no dejó de trabajar y muchos de los defectos que temía se hicieron realidad en su vida.",
      "En la película Carros de fuego, un velocista olímpico manifiesta que no corre porque le guste, sino porque es un adicto. Antes de la prueba olímpica, admite con angustia: \"Diez segundos para justificar toda mi existencia\". ¿Cuántas personas viven así? ¿Cuántas han construido toda su identidad sobre un logro, una posición, un reconocimiento? El problema no es esforzarse o querer hacerlo bien. El problema es cuando el resultado de ese esfuerzo se convierte en la condición para sentirse valioso y amado.",
      "Bill, a quien conocemos en el libro, había perdido mucho dinero durante la crisis económica de 2008-2009, después de haberse convertido al cristianismo tres años antes. \"Si esto me hubiera pasado antes de ser cristiano, me hubiera aborrecido a mí mismo, quizá hubiera vuelto a recurrir a la bebida o puede que al suicidio\", declaró. En determinada época, solo se sentía una persona digna y valiosa si ganaba dinero. Pero su identidad había cambiado. Ya no descansaba sobre el hecho de tener éxito, sino que se cimentaba en la gracia y el amor de Jesucristo. Por eso pudo decir: \"Hoy día le aseguro de corazón que nunca he sido tan feliz en toda mi vida\"."
    ],
    reflection: "¿Está tu sentido de valor personal ligado a lo que logras? ¿Qué pasa en tu interior cuando fracasas o cuando no eres reconocido?",
    prayer: "Señor, que mi identidad no descanse en mis logros sino en Tu amor por mí. Que sea libre para trabajar duro sin que el resultado sea la condición de mi paz. Amén."
  },
  {
    title: "El Poder como Ídolo",
    subtitle: "La búsqueda de control y dominio",
    verse: "\"El camino para ascender desciende; el camino para descender es ascender.\" — Predicador anónimo",
    content: [
      "En el siglo VI a.C., el rey babilonio Nabucodonosor era el hombre más poderoso del mundo. Sin embargo, el libro de Daniel revela que el hombre más poderoso del mundo no dormía bien. Tuvo un sueño que le perturbó profundamente: una figura inmensa que se vino abajo, con pies de barro. El teólogo Reinhold Niebuhr creía que el miedo y la ansiedad son el motivo de que muchos busquen el poder político. Incluso si el temor no es el motivo inicial para conseguirlo, casi siempre lo acompaña. Cuanto más asciende una persona, mayor es la posibilidad de padecer una caída espantosa.",
      "Niebuhr argumentó que los seres humanos somos inseguros y que procuramos superar nuestra inseguridad mediante la voluntad de poder. Pretendemos que no estamos limitados. Pero los seres humanos tienen muy poco poder sobre sus vidas. El 95 por ciento de lo que marca el rumbo de sus vidas escapa por completo a su control: el siglo y lugar donde nacen, quiénes son sus amigos y familiares, su entorno durante la infancia, su estatura física, los talentos heredados genéticamente. No somos Creadores infinitos, sino criaturas finitas y dependientes.",
      "El libro de C. S. Lewis La travesía del Viajero del Alba nos ofrece una parábola poderosa. Eustace Scrubb se quedó dormido sobre el tesoro de un dragón con pensamientos codiciosos y draconianos, y se convirtió en un dragón. Convertirse en dragón fue una \"consecuencia natural cósmica\". Como Eustace pensaba como un dragón, se convirtió en uno. Cuando ponemos nuestro corazón en el poder, nos convertimos en depredadores despiadados. Nos convertimos en aquello que adoramos. Eustace era ahora enormemente poderoso, pero también daba miedo, era horrible y estaba completamente solo.",
      "Algo similar le sucedió a Nabucodonosor. Su orgullo lo llevó a vivir como un animal. Pero cuando alzó los ojos al cielo, su razón fue restaurada y mayor grandeza le fue añadida. Este es el patrón profundo de la gracia: Jesús perdió todo poder y se convirtió en siervo para salvarnos. Murió, pero su muerte condujo a la redención y a la resurrección. La inseguridad desaparece, el deseo de poder se corta de raíz. Como dijo el predicador: \"El camino para ascender desciende; el camino para descender es ascender\"."
    ],
    reflection: "¿De qué maneras intentas controlar tu entorno o a las personas a tu alrededor? ¿Qué miedo o inseguridad está detrás de esa necesidad de control?",
    prayer: "Señor, en Tu presencia reconozco que no soy el capitán de mi destino. Tú eres el soberano. Ayúdame a descansar en Tu control y a servir en lugar de dominar. Amén."
  },
  {
    title: "Los Ídolos de Nuestra Cultura",
    subtitle: "Los dioses colectivos que nos moldean sin que nos demos cuenta",
    verse: "\"Toda 'esperanza' cultural dominante que no sea el propio Dios es un dios falso.\" — Timothy Keller",
    content: [
      "Andrew Delbanco describió la cultura como las historias y los símbolos mediante los cuales intentamos mantener a raya la sospecha melancólica de que vivimos en un mundo que no tiene sentido. En el meollo de toda cultura encontramos su \"esperanza\" principal. Delbanco establece tres fases de la civilización estadounidense: en la primera, la esperanza se manifestaba por medio de un discurso cristiano. En la segunda, la Ilustración eliminó el concepto de un Dios personal y lo sustituyó por una nación deificada. Hoy, la vida consiste en crear un yo mediante la maximización de la libertad individual.",
      "Los ídolos no sólo adoptan una forma individual; también pueden ser colectivos y sistémicos. Cuando estamos totalmente inmersos en una sociedad de personas que consideran que adorar a un ídolo concreto es normal, es casi imposible discernirlo. No debemos pensar que una cultura es menos idólatra que otra. Las sociedades tradicionales tienden a convertir la unidad familiar y el clan en un ente absoluto, lo cual puede conducir a asesinatos por honor, la consideración de las mujeres como objetos y la violencia contra los homosexuales. Las culturas occidentales, seculares, convierten la libertad individual en un ídolo.",
      "El análisis cultural es básicamente un estudio de la idolatría. Los ídolos culturales pueden ser el progreso tecnológico y la prosperidad económica. Los ídolos de las sociedades tradicionales incluyen la familia, el trabajo duro, el deber y la virtud moral, mientras que los de las sociedades occidentales son la libertad individual, el descubrimiento de uno mismo, la prosperidad y la realización personales. Todas estas cosas pueden adoptar, y adoptan, un tamaño y un poder desproporcionados dentro de una sociedad. Nos prometen seguridad, paz y felicidad; sólo tenemos que fundamentar nuestras vidas en ellas.",
      "También puede haber ídolos intelectuales, que a menudo se llaman ideologías. Los intelectuales europeos de finales del siglo XIX y principios del XX se convencieron del paradigma de Rousseau sobre la bondad innata de la naturaleza humana. La Segunda Guerra Mundial hizo trizas este espejismo. Beatrice Webb, arquitecta del estado del bienestar británico moderno, escribió décadas después: \"Me doy cuenta de lo persistentes que son los impulsos y los instintos malvados en el hombre. Ningún grado de conocimiento o de ciencia servirá de nada a menos que podamos frenar o dominar el impulso maligno\". Cuando tomamos una verdad parcial y la convertimos en verdad absoluta, hemos creado un ídolo intelectual."
    ],
    reflection: "¿Qué valores culturales de tu entorno has absorbido sin cuestionarlos? ¿Podrían estar compitiendo con tu lealtad a Cristo?",
    prayer: "Señor, dame ojos para ver los ídolos de mi cultura que he absorbido sin darme cuenta. Que sea transformado por la renovación de mi entendimiento, no conformado a este siglo. Amén."
  },
  {
    title: "Los Ídolos de Nuestra Religión",
    subtitle: "Cuando la fe misma se convierte en idolatría",
    verse: "\"La idolatría está tan extendida que también domina el área religiosa.\" — Timothy Keller",
    content: [
      "¿Cómo nos pueden esclavizar nuestros ídolos culturales? La respuesta a los problemas culturales no es necesariamente una dosis mayor de religión. La idolatría está tan extendida que también domina esta área. Un ídolo es algo a lo que le pedimos las cosas que sólo puede darnos Dios. La idolatría funciona ampliamente dentro de las comunidades religiosas cuando la verdad doctrinal se eleva al rango de falso dios. Esto sucede cuando las personas se fundamentan en la rectitud de su doctrina para decidir cómo las ve Dios, en lugar de hacerlo sobre el propio Dios y su gracia.",
      "Es un error sutil, pero letal. El indicio de que se ha caído en este tipo de autojustificación es que se convierte en lo que el libro de Proverbios llama un \"escarnecedor\". Los escarnecedores siempre manifiestan desprecio y desafío a sus adversarios, en lugar de gracia. Esto es una señal de que no se consideran pecadores salvos por gracia. En lugar de eso, su confianza en la justicia de sus puntos de vista les hace sentirse superiores. La certeza doctrinal que no produce humildad se ha convertido en ídolo.",
      "Otra forma de idolatría dentro de las comunidades religiosas convierte en dios falso los dones espirituales y los progresos en el ministerio. Los dones espirituales —el talento, la capacidad, el rendimiento, el crecimiento— a menudo se confunden con lo que la Biblia denomina \"frutos\" del Espíritu —amor, gozo, paciencia, humildad, valor, templanza—. Incluso los líderes religiosos que creen intelectualmente \"Soy salvo sólo por gracia\" pueden llegar a sentir en su corazón que su posición delante de Dios depende en gran medida del número de vidas que cambien en el mundo.",
      "Otro tipo de idolatría religiosa tiene que ver con la propia vida moral. La naturaleza por defecto del corazón humano le induce a intentar controlar a Dios y a los demás mediante la conducta moral. Como hemos llevado una vida de virtud, sentimos que Dios —y las personas a las que conocemos— nos deben su respeto y su apoyo. Aunque podamos decir que Jesús es nuestro ejemplo y nuestra inspiración, en el fondo seguimos buscando salvarnos mediante nuestro esfuerzo moral. Esta es la raíz del fariseísmo, una forma de idolatría profundamente religiosa que termina en arrogancia y en dureza de corazón."
    ],
    reflection: "¿Hay maneras en que tu propia religiosidad podría haberse convertido en un ídolo? ¿Estás descansando en Cristo o en tu desempeño espiritual?",
    prayer: "Señor, que mi fe no sea un logro del que enorgullecerme, sino una respuesta al amor que has derramado sobre mí en Cristo. Guárdame del fariseísmo y del orgullo espiritual. Amén."
  },
  {
    title: "La Historia de Jonás",
    subtitle: "Los ídolos que nos impiden obedecer a Dios",
    verse: "\"Y Jonás se levantó para huir de la presencia de Jehová.\" — Jonás 1:3",
    content: [
      "Por 2 Reyes 14:25 sabemos que Jonás había llamado al rey israelita Jeroboam a seguir una política militar expansionista para ampliar las fronteras del país. Sus contemporáneos, Amós y Oseas, se oponían a la corrupción de las administraciones monárquicas. Sin embargo, Jonás parece haber ignorado deliberadamente las fechorías del rey, movido por su celo nacionalista. A semejante profeta le dejaría anonadado el mandamiento de Dios que le ordenaba ir a la ciudad de Nínive, la capital del enemigo, y predicar en ella.",
      "Nínive era la ciudad más poderosa del mundo, la sede del imperio asirio, cuyo ejército amenazaba con conquistar Israel. Hacer algo que beneficiara en cualquier sentido a Asiria se hubiera considerado un suicidio nacional. Y a Jonás se le enviaba no solo a predicarles sino a darles una oportunidad de arrepentirse y escapar del juicio. La misión era imposible e inaceptable. Por eso huyó. La respuesta de Jonás revela los ídolos que operaban en su corazón: un ídolo personal (el éxito en su ministerio), un ídolo cultural (los intereses nacionales de Israel por encima de la obediencia a Dios) y un ídolo religioso (la arrogancia moral, la sensación de ser superior a los ninivitas).",
      "En el vientre del pez, Jonás elevó una oración que contiene una línea misteriosa: \"Los que siguen vanidades ilusorias, su misericordia abandonan\". Pero Jonás llama a esa gracia \"su propia gracia\", indicando que también les pertenece a los ninivitas tanto como a él. La idea de que la gracia de Dios era de ellos tanto como suya le alcanzó como un rayo. Si es gracia auténtica, nadie es digno de ella, lo cual los hacía a todos iguales. \"¡La salvación viene sólo del Señor!\" No pertenece a una raza o a una clase de personas. Este fue el inicio del cambio en el corazón de Jonás.",
      "Jonás obedeció, predicó, y para sorpresa de todos, incluyendo la suya, los ninivitas se arrepintieron. Pero entonces Jonás se puso furioso. Lo que al final se reveló en su corazón fue que no solo no quería predicar en Nínive —no quería que Dios los salvara. Su odio a esa raza era tan profundo que consideraba que lo peor que podía pasar era que Dios les perdonase. Este es el poder de la idolatría: puede conseguir que llamemos bien al mal y mal al bien. Puede corromper incluso a un profeta de Dios hasta el punto de que odie la misericordia divina."
    ],
    reflection: "¿Hay grupos de personas a los que no deseas ver alcanzados por la gracia de Dios? ¿Qué ídolo podría estar detrás de esa actitud?",
    prayer: "Señor, examina si hay en mi corazón algo parecido al orgullo de Jonás. Que Tu amor por todos los pueblos transforme mi corazón. Que quiera lo que Tú quieres para todos. Amén."
  },
  {
    title: "La Raza y la Gracia",
    subtitle: "Cuando el orgullo étnico o cultural niega el evangelio",
    verse: "\"Pedro no actuaba conforme al evangelio.\" — Gálatas 2:14",
    content: [
      "El orgullo racial y el chauvinismo cultural no pueden coexistir con el evangelio de la gracia. Se excluyen mutuamente, una cosa repele a la otra. Debido a la naturaleza del corazón humano, que siempre intenta justificarse, es natural que consideremos que las características de nuestra cultura o clase son superiores a las de todo el mundo. Pero el evangelio contrarresta esta tendencia natural. Esto lo vemos en la confrontación entre Pablo y Pedro en Gálatas 2.",
      "Pedro, apóstol judío, había sido educado para ver a los gentiles como \"impuros\" espiritualmente, personas con quienes no debía comer. En las culturas de la antigüedad, comer con alguien simbolizaba la apertura y la aceptación. Cuando Pablo vio que Pedro se negaba a cenar con los gentiles cristianos, le reprendió por su racismo. Pero, ¿cómo lo hizo? No le dijo: \"Estás transgrediendo las normas sobre el racismo\", sino más bien que Pedro \"no actuaba conforme al evangelio\". Pablo sostenía que el prejuicio racial negaba el mismísimo principio de la salvación por gracia.",
      "Decía: \"Pedro, si todos somos salvos sólo por gracia, ¿cómo puedes sentirte superior a nadie? ¿Cómo puedes excluir a otros en virtud de su raza y su nacionalidad? ¡Usa el evangelio que llevas en el corazón!\". Por supuesto, Pedro conocía el evangelio hasta cierto punto, pero en un nivel más profundo aquel no le había influenciado completamente. No caminaba rectamente conforme a la verdad del evangelio. Esta brecha entre lo que creemos con la mente y lo que gobierna realmente nuestras emociones y acciones es precisamente el campo donde opera la idolatría.",
      "Quienes no están seguros en Cristo buscan salvavidas espirituales con los que respaldar su confianza, y en esa búsqueda frenética no sólo se aferran a los despojos de la capacidad y la justicia que encuentran en sus vidas, sino que se fijan en su raza, su membresía en un partido, sus parejas familiares, sociales y eclesiales, y su cultura, usándolos como medio para autorrecomendarse. Se visten con su cultura como si fuera una armadura contra las dudas sobre sí mismos, pero se convierte en una camisa de fuerza mental. El único antídoto es la fe integral en la obra salvadora de Cristo."
    ],
    reflection: "¿Hay maneras en que tu identidad cultural, nacional o étnica afecta negativamente tu trato a personas de otros grupos? ¿El evangelio realmente está gobernando tu corazón en esa área?",
    prayer: "Señor, que el evangelio de gracia destruya toda barrera de orgullo racial o cultural en mi corazón. Que me vea a mí mismo y a todos los demás como igualmente dependientes de Tu misericordia. Amén."
  },
  {
    title: "Jonás y el Final Impactante",

// Render navigation tabs
const navTabs = document.getElementById('nav-tabs');
days.forEach((d, i) => {
  const btn = document.createElement('button');
  btn.className = 'tab-btn';
  btn.textContent = i + 1;
  btn.title = d.title;
  btn.onclick = () => showDay(i);
  navTabs.appendChild(btn);
});

// Render day cards
const container = document.getElementById('cards-container');
days.forEach((d, i) => {
  const card = document.createElement('div');
  card.className = 'day-card';
  card.id = 'day-' + i;

  const contentHTML = d.content.map(p => `<p>${p}</p>`).join('');

  card.innerHTML = `
    <div class="day-header">
      <div class="day-label">Día ${i + 1} de 30</div>
      <div class="day-title">${d.title}</div>
      <div class="day-subtitle">${d.subtitle}</div>
    </div>
    <div class="day-body">
      <div class="verse-box">
        ${d.verse.replace(/—/, '<span class="verse-ref">—</span>')}
      </div>
      <div class="day-content">${contentHTML}</div>
      <div class="reflection-box">
        <h3>🪞 Reflexión del Día</h3>
        <p>${d.reflection}</p>
      </div>
      <div class="prayer-box">
        <h3>🙏 Oración</h3>
        <p>${d.prayer}</p>
      </div>
    </div>
    <div class="done-btn-wrap">
      <button class="btn-done" id="done-btn-${i}" onclick="markDone(${i})">
        ✓ Marcar como leído
      </button>
      ${i < days.length - 1 ? `<button class="btn-next" onclick="nextDay(${i})">Día siguiente →</button>` : ''}
      <span class="completed-badge" id="badge-${i}">✓ ¡Completado!</span>
    </div>
  `;

  container.appendChild(card);
});

// State
let completed = JSON.parse(localStorage.getItem('devocional_progress') || '[]');
let currentDay = 0;

function saveProgress() {
  try { localStorage.setItem('devocional_progress', JSON.stringify(completed)); } catch(e) {}
}

function updateProgress() {
  const count = completed.length;
  const pct = (count / days.length) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${count} de ${days.length} días completados`;

  // Update tab buttons
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.remove('done', 'active');
    if (completed.includes(i)) btn.classList.add('done');
    if (i === currentDay) btn.classList.add('active');
  });

  // Update done buttons
  days.forEach((d, i) => {
    const doneBtn = document.getElementById('done-btn-' + i);
    const badge = document.getElementById('badge-' + i);
    if (doneBtn && badge) {
      if (completed.includes(i)) {
        doneBtn.textContent = '✓ Leído';
        doneBtn.classList.add('completed');
        badge.classList.add('show');
      } else {
        doneBtn.textContent = '✓ Marcar como leído';
        doneBtn.classList.remove('completed');
        badge.classList.remove('show');
      }
    }
  });
}

function showDay(index) {
  document.querySelectorAll('.day-card').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  
  currentDay = index;
  document.getElementById('day-' + index).classList.add('active');
  document.querySelectorAll('.tab-btn')[index].classList.add('active');
  
  window.scrollTo({ top: 0, behavior: 'smooth' });
  updateProgress();
}

function markDone(index) {
  if (!completed.includes(index)) {
    completed.push(index);
    saveProgress();
    updateProgress();
  }
}

function nextDay(index) {
  if (!completed.includes(index)) markDone(index);
  if (index + 1 < days.length) showDay(index + 1);
}

// Find first unread day
function findFirstUnread() {
  for (let i = 0; i < days.length; i++) {
    if (!completed.includes(i)) return i;
  }
  return 0;
}

// Init
showDay(findFirstUnread());
updateProgress();
</script>
